<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFV G-CB06 Pack Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn { background: #ff4500; color: white; border: none; padding: 12px 24px; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #ff5722; }
        .pack-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .card { background: #2a2a2a; border: 2px solid #444; border-radius: 8px; padding: 15px; width: 140px; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .rarity { font-weight: bold; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-top: 10px; display: inline-block; }
        .R { color: #00cdff; } .RR { color: #ff00ff; } .RRR { color: #ffcc00; } .GR { color: #ff3333; } .C { color: #ccc; } .SP, .SGR, .Re { color: #00ffcc; animation: glow 1s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 5px #fff, 0 0 10px #00ffcc; } to { text-shadow: 0 0 10px #fff, 0 0 20px #00ffcc; } }
    </style>
</head>
<body>

    <h1>Vanguard G-CB06 Pack Simulator</h1>
    <p>Mở pack 7 lá theo tỷ lệ chuẩn Series G</p>
    <button class="btn" onclick="openPack()">MỞ PACK</button>

    <div class="pack-container" id="packDisplay"></div>

    <script>
        // Dữ liệu từ file JSON G-CB06 của bạn
        const cardDatabase = [
            {"card_number": "SPG-CB06/S01EN", "card_name": "Genesis Dragon, Basaltis Messiah (SP)", "rarity": "SP"},
            {"card_number": "SPG-CB06/S02EN", "card_name": "Death Star-vader, \"Omega Fall\" Glendios (SP)", "rarity": "SP"},
            {"card_number": "SPG-CB06/S03EN", "card_name": "Death Star-vader, Glueball Dragon (SP)", "rarity": "SP"},

            {"card_number": "SPG-CB06/S05EN", "card_name": "Star-vader, Chaos Breaker Crisis (SP)", "rarity": "SP"},
            {"card_number": "SPG-CB06/S06EN", "card_name": "Darkjet Deletor, Greyend (SP)", "rarity": "SP"},
            {"card_number": "SPG-CB06/S07EN", "card_name": "Prayer Child of Steady State Cosmo (SP)", "rarity": "SP"},
            {"card_number": "SPG-CB06/S08EN", "card_name": "Iron Wall Star-vader, Thorium (SP)", "rarity": "SP"},
            {"card_number": "SGRG-CB06/001EN", "card_name": "Genesis Dragon, Harmonics Neo Messiah (SGR)", "rarity": "SGR"},
            {"card_number": "SGRG-CB06/002EN", "card_name": "Death Star-vader, Chaos Breaker Deluge (SGR)", "rarity": "SGR"},
            {"card_number": "RRRG-CB06/Re:01EN", "card_name": "Death Star-vader, Chaos Universe", "rarity": "Re"},
            {"card_number": "RRRGCB06-/Re:02EN", "card_name": "Star-vader, Chaos Breaker Dragon", "rarity": "Re"},
            {"card_number": "RRRG-CB06/Re:03EN", "card_name": "Flowers in Vacuum, Cosmo Wreath", "rarity": "Re"},
            {"card_number": "RRRG-CB06/Re:04EN", "card_name": "Blink Messiah", "rarity": "Re"},
            {"card_number": "GRG-CB06/001EN", "card_name": "Genesis Dragon, Harmonics Neo Messiah", "rarity": "GR"},
            {"card_number": "GRG-CB06/002EN", "card_name": "Death Star-vader, Chaos Breaker Deluge", "rarity": "GR"},
            {"card_number": "RRRG-CB06/003EN", "card_name": "Genesis Dragon, Basaltis Messiah", "rarity": "RRR"},
            {"card_number": "RRRG-CB06/004EN", "card_name": "Death Star-vader, \"Omega Fall\" Glendios", "rarity": "RRR"},
            {"card_number": "RRRG-CB06/005EN", "card_name": "Death Star-vader, Glueball Dragon", "rarity": "RRR"},
            {"card_number": "RRRG-CB06/006EN", "card_name": "Deliberate Deletor, Aodaien", "rarity": "RRR"},
            {"card_number": "RRRG-CB06/007EN", "card_name": "Star-vader, Chaos Breaker Crisis", "rarity": "RRR"},
            {"card_number": "RRRG-CB06/008EN", "card_name": "Darkjet Deletor, Greyend", "rarity": "RRR"},
            {"card_number": "RRG-CB06/009EN", "card_name": "Lady Fencer of Matter Transmission", "rarity": "RR"},
            {"card_number": "RRG-CB06/010EN", "card_name": "Star-vader, Colony Maker", "rarity": "RR"},
            {"card_number": "RRG-CB06/011EN", "card_name": "Star-vader, Strange Dragon", "rarity": "RR"},
            {"card_number": "RRG-CB06/012EN", "card_name": "Globule Dober", "rarity": "RR"},
            {"card_number": "RRG-CB06/013EN", "card_name": "Star-vader, Metonaxe Dragon", "rarity": "RR"},
            {"card_number": "RRG-CB06/014EN", "card_name": "Prayer Child of Steady State Cosmo", "rarity": "RR"},
            {"card_number": "RRG-CB06/015EN", "card_name": "Iron Wall Star-vader, Thorium", "rarity": "RR"},
            {"card_number": "RRG-CB06/016EN", "card_name": "Remove Deletor, Igalga", "rarity": "RR"},
            {"card_number": "RG-CB06/017EN", "card_name": "Nebula Dragon, Cyclic Dragon", "rarity": "R"},
            {"card_number": "RG-CB06/018EN", "card_name": "Genesis Machine Deity, Desthergen", "rarity": "R"},
            {"card_number": "RG-CB06/019EN", "card_name": "Blaming Deletor, Ibiores", "rarity": "R"},
            {"card_number": "RG-CB06/020EN", "card_name": "Confront Deletor, Jagwokk", "rarity": "R"},
            {"card_number": "RG-CB06/021EN", "card_name": "Star-vader, Boseritter", "rarity": "R"},
            {"card_number": "RG-CB06/022EN", "card_name": "Star-vader, Crusgabel", "rarity": "R"},
            {"card_number": "RG-CB06/023EN", "card_name": "Star-vader, Globuladia", "rarity": "R"},
            {"card_number": "RG-CB06/024EN", "card_name": "Black Bullet of Iron Star, Photosphere", "rarity": "R"},
            {"card_number": "RG-CB06/025EN", "card_name": "Forbid Deletor, Zakuelad", "rarity": "R"},
            {"card_number": "RG-CB06/026EN", "card_name": "Star-vader, Spiral Arm", "rarity": "R"},
            {"card_number": "RG-CB06/027EN", "card_name": "Star-vader, Penrose Gate", "rarity": "R"},
            {"card_number": "RG-CB06/028EN", "card_name": "Dark Metal Chameleon", "rarity": "R"},
            {"card_number": "RG-CB06/029EN", "card_name": "Hire Deletor, Farwon", "rarity": "R"},
            {"card_number": "CG-CB06/030EN", "card_name": "Lady Gunner of the Neutron Star", "rarity": "C"},
            {"card_number": "CG-CB06/031EN", "card_name": "One who Bisects the Intersteller Gap", "rarity": "C"},
            {"card_number": "CG-CB06/032EN", "card_name": "Rapid Gunner of Degeneration", "rarity": "C"},
            {"card_number": "CG-CB06/033EN", "card_name": "Star-vader, Red Sprite Dragon", "rarity": "C"},
            {"card_number": "CG-CB06/034EN", "card_name": "Gravitate Turtle", "rarity": "C"},
            {"card_number": "CG-CB06/035EN", "card_name": "Abolition Star-vader, Neodymium", "rarity": "C"},
            {"card_number": "CG-CB06/036EN", "card_name": "Cosmosphere Cat", "rarity": "C"},
            {"card_number": "CG-CB06/037EN", "card_name": "Star-vader, Elgibs", "rarity": "C"},
            {"card_number": "CG-CB06/038EN", "card_name": "Flutter Deletor, Zuiije", "rarity": "C"},
            {"card_number": "CG-CB06/039EN", "card_name": "Star-vader, Planck Dracokid", "rarity": "C"},
            {"card_number": "CG-CB06/040EN", "card_name": "Star-vader, Magnetor Hedgehog", "rarity": "C"},
            {"card_number": "CG-CB06/041EN", "card_name": "Star-vader, Roche Wave", "rarity": "C"},
            {"card_number": "CG-CB06/042EN", "card_name": "Star-vader, Ether Looper", "rarity": "C"},
            {"card_number": "CG-CB06/043EN", "card_name": "Star-vader, Paradigm Shift Dragon", "rarity": "C"},
            {"card_number": "CG-CB06/044EN", "card_name": "Star-vader, Quark Shoebill", "rarity": "C"},
            {"card_number": "CG-CB06/045EN", "card_name": "Rendering Deletor, Efames", "rarity": "C"}
        ];

        // Phân loại danh sách theo độ hiếm
        const commons = cardDatabase.filter(c => c.rarity === "C");
        const rares = cardDatabase.filter(c => c.rarity === "R");
        const doubleRares = cardDatabase.filter(c => c.rarity === "RR");
        const tripleRares = cardDatabase.filter(c => c.rarity === "RRR");
        const generationRares = cardDatabase.filter(c => c.rarity === "GR");
        const highRares = cardDatabase.filter(c => ["SP", "SGR", "Re"].includes(c.rarity));

        function getRandomCard(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function openPack() {
            let pack = [];

            // 1. Lấy 5 lá bài Common đầu tiên
            for (let i = 0; i < 5; i++) {
                pack.push(getRandomCard(commons));
            }

            // 2. Lá thứ 6: Mặc định là R hoặc RR
            if (Math.random() < 0.3) {
                pack.push(getRandomCard(doubleRares)); // 30% ra RR
            } else {
                pack.push(getRandomCard(rares)); // 70% ra R
            }

            // 3. Lá thứ 7: Slot "Hit" lớn hoặc lá R thứ hai
            let roll = Math.random();
            if (roll < 0.02) {
                pack.push(getRandomCard(highRares)); // 2% trúng hàng đặc biệt SP/SGR/Re
            } else if (roll < 0.05) {
                pack.push(getRandomCard(generationRares)); // 3% trúng GR
            } else if (roll < 0.15) {
                pack.push(getRandomCard(tripleRares)); // 10% trúng RRR
            } else {
                pack.push(getRandomCard(rares)); // 85% còn lại là lá R thông thường
            }

            displayPack(pack);
        }

        function displayPack(pack) {
            const container = document.getElementById("packDisplay");
            container.innerHTML = "";

            pack.forEach(card => {
                const cardEl = document.createElement("div");
                cardEl.className = "card";
                cardEl.innerHTML = `
                    <div><strong>${card.card_name}</strong></div>
                    <div class="rarity ${card.rarity}">${card.rarity}</div>
                `;
                container.appendChild(cardEl);
            });
        }
    </script>
</body>
</html>
